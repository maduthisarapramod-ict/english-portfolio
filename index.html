    let currentPageIndex = 0;

    function renderPage(index) {
        const pageCanvas = document.getElementById("pageDisplay");
        const videoHub = document.getElementById("videoMediaHub");
        const videoIframe = document.getElementById("persistentIframe");
        const videoTitle = document.getElementById("videoTitleTag");
        const deckIndicator = document.getElementById("deckIndicator");
        const progressBar = document.getElementById("progressBar");
        const progressLabel = document.getElementById("progressLabel");

        pageCanvas.classList.remove("page-turn-active");
        void pageCanvas.offsetWidth; 
        pageCanvas.classList.add("page-turn-active");

        pageCanvas.innerHTML = portfolioContent[index].html;

        const layer1 = document.getElementById("bgLayer1");
        const layer2 = document.getElementById("bgLayer2");
        const targetImg = portfolioContent[index].bgImg;

        if (layer1.classList.contains("bg-active")) {
            layer2.style.backgroundImage = `url('${targetImg}')`;
            layer1.classList.remove("bg-active");
            layer2.classList.add("bg-active");
        } else {
            layer1.style.backgroundImage = `url('${targetImg}')`;
            layer2.classList.remove("bg-active");
            layer1.classList.add("bg-active");
        }

        if (portfolioContent[index].videoUrl) {
            videoHub.style.display = "block";
            videoTitle.innerText = portfolioContent[index].videoLabel;
            if (videoIframe.src !== portfolioContent[index].videoUrl) {
                videoIframe.src = portfolioContent[index].videoUrl;
            }
        } else {
            videoHub.style.display = "none";
            videoIframe.src = "";
        }

        if (index === 0) {
            deckIndicator.innerText = "INDEX MANIFEST";
            progressLabel.innerText = "Module Index";
            progressBar.style.width = "0%";
        } else if (index === portfolioContent.length - 1) {
            deckIndicator.innerText = "CONCLUDING CHAPTER";
            progressLabel.innerText = "Portfolio Complete";
            progressBar.style.width = "100%";
        } else {
            deckIndicator.innerText = `NODE PROGRESS: ${index} / 10`;
            progressLabel.innerText = `Analysis Progress`;
            let fillPercentage = (index / (portfolioContent.length - 2)) * 100;
            progressBar.style.width = `${fillPercentage}%`;
        }
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function turnPageForward() {
        if (currentPageIndex < portfolioContent.length - 1) {
            currentPageIndex++;
        } else {
            currentPageIndex = 0;
        }
        renderPage(currentPageIndex);
    }

    function turnPageBack() {
        if (currentPageIndex > 0) {
            currentPageIndex--;
        } else {
            currentPageIndex = portfolioContent.length - 1;
        }
        renderPage(currentPageIndex);
    }

    function goHome() {
        currentPageIndex = 0;
        renderPage(currentPageIndex);
    }

    function jumpToPage(targetPageNum) {
        if(targetPageNum >= 0 && targetPageNum < portfolioContent.length) {
            currentPageIndex = targetPageNum;
            renderPage(currentPageIndex);
        }
    }

    window.addEventListener("DOMContentLoaded", () => {
        renderPage(0);
    });
</script>
